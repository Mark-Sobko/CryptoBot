name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-lock.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt
          python -m pip check

      - name: Secret and runtime artifact scan
        run: python scripts/secret_scan.py --history

      - name: Compile Python sources
        run: python -m compileall -q core engine tests scripts main.py config.py analyze_trades.py

      - name: Unit tests
        env:
          BYBIT_API_KEY: test-key
          BYBIT_API_SECRET: test-secret
          TELEGRAM_TOKEN: ""
          TELEGRAM_CHAT_ID: ""
        run: python -m unittest discover -s tests -v
